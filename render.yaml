services:
  - type: web
    name: agent-reliability-backend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_INPUT_COST_PER_MILLION_USD
        value: "0.075"
      - key: LLM_OUTPUT_COST_PER_MILLION_USD
        value: "0.30"
      - key: API_AUTH_TOKEN
        sync: false
      - key: LEGACY_DATABASE_URL
        sync: false
      - key: KNOWLEDGE_DATABASE_URL
        sync: false
      - key: CHAOS_STATE_PATH
        value: /tmp/chaos-state.json

