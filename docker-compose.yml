name: agent-reliability-harness

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LEGACY_DATABASE_URL: postgresql://${POSTGRES_LEGACY_USER:-legacy}:${POSTGRES_LEGACY_PASSWORD:-legacy}@db-legacy:5432/${POSTGRES_LEGACY_DB:-legacy_crm}
  KNOWLEDGE_DATABASE_URL: postgresql://${POSTGRES_KNOWLEDGE_USER:-knowledge}:${POSTGRES_KNOWLEDGE_PASSWORD:-knowledge}@db-knowledge:5432/${POSTGRES_KNOWLEDGE_DB:-knowledge_platform}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  LLM_MODEL: ${LLM_MODEL:-llama3.1:8b}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
  GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
  LLM_INPUT_COST_PER_MILLION_USD: ${LLM_INPUT_COST_PER_MILLION_USD:-0.0}
  LLM_OUTPUT_COST_PER_MILLION_USD: ${LLM_OUTPUT_COST_PER_MILLION_USD:-0.0}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
  CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.80}
  INTEGRATION_TIMEOUT_SECONDS: ${INTEGRATION_TIMEOUT_SECONDS:-4.0}
  CHAOS_STATE_PATH: /app/chaos/state.json
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-agent-reliability-backend}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

services:
  db-legacy:
    build: ./db/legacy_crm
    environment:
      POSTGRES_USER: ${POSTGRES_LEGACY_USER:-legacy}
      POSTGRES_PASSWORD: ${POSTGRES_LEGACY_PASSWORD:-legacy}
      POSTGRES_DB: ${POSTGRES_LEGACY_DB:-legacy_crm}
    ports: ["5433:5432"]
    volumes: ["legacy-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_LEGACY_USER:-legacy} -d ${POSTGRES_LEGACY_DB:-legacy_crm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-knowledge:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_KNOWLEDGE_USER:-knowledge}
      POSTGRES_PASSWORD: ${POSTGRES_KNOWLEDGE_PASSWORD:-knowledge}
      POSTGRES_DB: ${POSTGRES_KNOWLEDGE_DB:-knowledge_platform}
    ports: ["5434:5432"]
    volumes:
      - knowledge-data:/var/lib/postgresql/data
      - ./db/knowledge_platform/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KNOWLEDGE_USER:-knowledge} -d ${POSTGRES_KNOWLEDGE_DB:-knowledge_platform}"]
      interval: 5s
      timeout: 3s
      retries: 20

  knowledge-ingest:
    build: ./db/knowledge_platform
    environment:
      KNOWLEDGE_DATABASE_URL: postgresql://${POSTGRES_KNOWLEDGE_USER:-knowledge}:${POSTGRES_KNOWLEDGE_PASSWORD:-knowledge}@db-knowledge:5432/${POSTGRES_KNOWLEDGE_DB:-knowledge_platform}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    depends_on:
      db-knowledge:
        condition: service_healthy
    restart: "no"

  legacy-seed:
    build: ./db/legacy_crm
    entrypoint: ["python3", "/opt/harness/seed_data.py"]
    command: ["--reset"]
    environment:
      LEGACY_DATABASE_URL: postgresql://${POSTGRES_LEGACY_USER:-legacy}:${POSTGRES_LEGACY_PASSWORD:-legacy}@db-legacy:5432/${POSTGRES_LEGACY_DB:-legacy_crm}
    depends_on:
      db-legacy:
        condition: service_healthy
    profiles: ["tools"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    ports: ["8000:8000"]
    volumes:
      - ./chaos:/app/chaos
      - ./eval:/app/eval
    depends_on:
      db-legacy:
        condition: service_healthy
      knowledge-ingest:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
      BACKEND_API_KEY: ${API_AUTH_TOKEN:-}
      GRAFANA_URL: http://localhost:3000/d/agent-overview
    ports: ["8501:8501"]
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

  chaos:
    image: python:3.11-slim
    working_dir: /app
    volumes: ["./chaos:/app/chaos"]
    profiles: ["tools"]
    command: ["python", "chaos/reset.py"]

volumes:
  legacy-data:
  knowledge-data:
  prometheus-data:
  grafana-data:

